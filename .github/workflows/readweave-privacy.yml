name: ReadWeave privacy gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  privacy:
    name: Reject secrets and personal paths
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch the official Trilium baseline
        run: git fetch --no-tags --depth=1 https://github.com/TriliumNext/Trilium.git refs/tags/v0.103.0:refs/tags/v0.103.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Scan ReadWeave changes
        run: node scripts/readweave/privacy-scan.mjs --all-changes
